<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VelocityType | Precision Typing Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* prevent accidental selection while typing, but input remains focusable */
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0b1120 0%, #111827 100%);
            font-family: 'Segoe UI', 'Fira Code', 'Menlo', 'Monaco', 'Cascadia Code', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* main game card */
        .game-container {
            max-width: 1100px;
            width: 100%;
            background: rgba(18, 25, 45, 0.75);
            backdrop-filter: blur(2px);
            border-radius: 3rem;
            padding: 1.5rem 2rem 2rem 2rem;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(66, 153, 225, 0.3);
            transition: all 0.2s;
        }

        /* header stats */
        .stats-panel {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: baseline;
            gap: 1rem;
            background: #0f172ad9;
            border-radius: 2rem;
            padding: 0.8rem 1.8rem;
            margin-bottom: 2rem;
            border: 1px solid #2d3a5e;
        }

        .stat {
            background: #02061770;
            padding: 0.4rem 1rem;
            border-radius: 3rem;
            font-weight: 600;
        }

        .stat-label {
            font-size: 0.75rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #8ba0c5;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 800;
            line-height: 1;
            color: #e2e8f0;
            font-family: monospace;
        }

        .wpm-value {
            color: #5ee0fa;
            text-shadow: 0 0 5px #0ff3;
        }

        /* quote / text display */
        .text-card {
            background: #0a0f1c;
            border-radius: 2rem;
            padding: 1.6rem 1.8rem;
            margin-bottom: 1.8rem;
            border-left: 6px solid #3b82f6;
            box-shadow: inset 0 0 10px #00000020, 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .reference-text {
            font-size: 1.65rem;
            line-height: 1.45;
            font-weight: 500;
            color: #cdd9ff;
            word-break: break-word;
            white-space: pre-wrap;
            font-family: 'Fira Code', monospace;
            letter-spacing: -0.2px;
        }

        .reference-text span {
            transition: background 0.05s ease;
            border-radius: 4px;
        }

        .correct {
            background-color: #14532d80;
            color: #bbf7d0;
            border-bottom: 1px solid #4ade80;
        }

        .incorrect {
            background-color: #7f1a1a90;
            color: #ffc9c9;
            text-decoration: underline;
            text-decoration-thickness: 2px;
            text-decoration-color: #f87171;
        }

        .current-highlight {
            background-color: #3b82f640;
            box-shadow: 0 0 0 1px #3b82f6;
            border-radius: 5px;
        }

        /* input area */
        .input-area {
            margin-bottom: 1.5rem;
        }

        textarea {
            width: 100%;
            background: #030712;
            border: 2px solid #2d3a6e;
            border-radius: 1.5rem;
            padding: 1.2rem 1.5rem;
            font-size: 1.4rem;
            font-family: 'Fira Code', monospace;
            color: #f0f3fa;
            resize: vertical;
            outline: none;
            transition: 0.2s;
            font-weight: 450;
            letter-spacing: 0.2px;
        }

        textarea:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px #3b82f640;
        }

        /* action buttons */
        .action-bar {
            display: flex;
            gap: 1.2rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            background: #1e293b;
            border: none;
            padding: 0.7rem 1.6rem;
            font-size: 1rem;
            font-weight: bold;
            font-family: inherit;
            border-radius: 3rem;
            color: #e2e8f0;
            cursor: pointer;
            transition: 0.15s linear;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: 1px solid #334155;
        }

        button i {
            font-style: normal;
            font-weight: 900;
        }

        button:hover {
            background: #2d3a5e;
            transform: scale(0.97);
            border-color: #5b8cce;
        }

        .btn-primary {
            background: #2563eb;
            color: white;
            border-color: #60a5fa;
            box-shadow: 0 2px 8px #1e3a8a60;
        }

        .btn-primary:hover {
            background: #1d4ed8;
        }

        .reset-btn {
            background: #3b2f2f;
            border-color: #a16262;
        }

        .status-badge {
            text-align: center;
            margin-top: 1.4rem;
            font-size: 0.9rem;
            font-weight: 500;
            background: #0b1120aa;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            padding: 0.4rem 1.2rem;
            border-radius: 2rem;
            color: #9ab3e0;
        }

        @media (max-width: 680px) {
            .game-container {
                padding: 1rem;
            }
            .reference-text {
                font-size: 1.2rem;
            }
            textarea {
                font-size: 1.1rem;
            }
            .stat-value {
                font-size: 1.3rem;
            }
        }

        footer {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 1rem;
            color: #4b556b;
        }
    </style>
</head>
<body>

<div class="game-container">
    <div class="stats-panel">
        <div class="stat">
            <div class="stat-label">⏱️ TIME (s)</div>
            <div class="stat-value" id="timerDisplay">0</div>
        </div>
        <div class="stat">
            <div class="stat-label">🚀 WPM</div>
            <div class="stat-value wpm-value" id="wpmDisplay">0</div>
        </div>
        <div class="stat">
            <div class="stat-label">🎯 ACCURACY</div>
            <div class="stat-value" id="accuracyDisplay">100%</div>
        </div>
        <div class="stat">
            <div class="stat-label">📝 PROGRESS</div>
            <div class="stat-value" id="progressDisplay">0/0</div>
        </div>
    </div>

    <div class="text-card">
        <div class="reference-text" id="referenceTextDisplay">
            <!-- dynamic highlighted text will be rendered here -->
        </div>
    </div>

    <div class="input-area">
        <textarea id="userInput" rows="3" placeholder="Start typing here... Press 'Reset' or 'New Quote' to refresh. Timer starts on first keystroke."></textarea>
    </div>

    <div class="action-bar">
        <button id="newQuoteBtn" class="btn-primary">✨ NEW QUOTE</button>
        <button id="resetBtn" class="reset-btn">⟳ RESET GAME</button>
    </div>
    <div class="status-badge" id="statusMessage">
        ⚡ Ready — Start typing above
    </div>
    <footer>
        ⌨️ case-sensitive | backspace works | timer starts at first character
    </footer>
</div>

<script>
    // ---------------------------------------------------------------
    // PREMIUM TYPING TEST LOGIC
    // ---------------------------------------------------------------
    // Large collection of interesting quotes / sentences
    const QUOTES_LIBRARY = [
        "The secret of getting ahead is getting started. Mark Twain",
        "Any fool can write code that a computer can understand. Good programmers write code that humans can understand.",
        "Typing is not just speed, it's rhythm and precision — every keystroke matters.",
        "Design is not just what it looks like and feels like. Design is how it works. Steve Jobs",
        "Simplicity is the soul of efficiency. Austin Freeman",
        "Life is like riding a bicycle. To keep your balance, you must keep moving. Albert Einstein",
        "Programming isn't about what you know; it's about what you can figure out.",
        "The only way to do great work is to love what you do. Steve Jobs",
        "In the midst of chaos, there is also opportunity. Sun Tzu",
        "Practice makes progress, not perfect — but progress is beautiful.",
        "Keep your face always toward the sunshine—and shadows will fall behind you. Walt Whitman",
        "Believe you can and you're halfway there. Theodore Roosevelt",
        "Every expert was once a beginner. Grace Hopper",
        "JavaScript: the language that builds the web with style and soul.",
        "Typing fast is fun, but typing accurately is a superpower."
    ];

    // DOM elements
    const referenceContainer = document.getElementById("referenceTextDisplay");
    const userTextarea = document.getElementById("userInput");
    const timerDisplay = document.getElementById("timerDisplay");
    const wpmDisplay = document.getElementById("wpmDisplay");
    const accuracyDisplay = document.getElementById("accuracyDisplay");
    const progressDisplay = document.getElementById("progressDisplay");
    const statusMsgDiv = document.getElementById("statusMessage");
    const newQuoteBtn = document.getElementById("newQuoteBtn");
    const resetBtn = document.getElementById("resetBtn");

    // Game state
    let currentQuote = "";            // raw target string
    let userInput = "";               // current input from textarea
    let timer = null;                 // interval id
    let timeElapsed = 0;              // seconds
    let isActive = false;             // typing session active? timer running?
    let gameCompleted = false;        // to prevent further typing after finishing quote exactly
    let startTimestamp = 0;            // for accurate timer start on first key

    // Helper: get random quote
    function getRandomQuote() {
        const randomIndex = Math.floor(Math.random() * QUOTES_LIBRARY.length);
        return QUOTES_LIBRARY[randomIndex];
    }

    // render highlighted text: compare userInput vs currentQuote
    function renderHighlightedText() {
        if (!currentQuote) return;
        const quoteLen = currentQuote.length;
        const inputLen = userInput.length;
        let html = "";
        for (let i = 0; i < quoteLen; i++) {
            const quoteChar = currentQuote[i];
            let charClass = "";
            let isCurrent = (i === inputLen && !gameCompleted); // highlight only if not completed & typing cursor position
            
            if (i < inputLen) {
                const userChar = userInput[i];
                if (userChar === quoteChar) {
                    charClass = "correct";
                } else {
                    charClass = "incorrect";
                }
            } else {
                // no input beyond, no style except if it's the caret position & still active
                charClass = "";
            }
            
            // additional class for active cursor zone (only if game not finished & user hasn't exceeded)
            if (isActive && !gameCompleted && i === inputLen && inputLen < quoteLen) {
                html += `<span class="${charClass} current-highlight">${escapeHtml(quoteChar)}</span>`;
            } else {
                if (charClass) {
                    html += `<span class="${charClass}">${escapeHtml(quoteChar)}</span>`;
                } else {
                    html += `<span>${escapeHtml(quoteChar)}</span>`;
                }
            }
        }
        // if user typed beyond quote length, show extra red indication (optional but show warning style)
        if (inputLen > quoteLen && !gameCompleted) {
            const extraChars = userInput.slice(quoteLen);
            html += `<span style="background:#b91c1c80; color:#ffb3b3; text-decoration:line-through;">${escapeHtml(extraChars)}</span>`;
        }
        referenceContainer.innerHTML = html;
        
        // update progress display (correct chars up to min length)
        let correctCount = 0;
        const minLen = Math.min(userInput.length, currentQuote.length);
        for (let i = 0; i < minLen; i++) {
            if (userInput[i] === currentQuote[i]) correctCount++;
        }
        const totalChars = currentQuote.length;
        progressDisplay.innerText = `${correctCount}/${totalChars}`;
        
        // compute accuracy (based on total typed vs correct)
        let totalTyped = userInput.length;
        let accuracy = 100;
        if (totalTyped > 0) {
            accuracy = (correctCount / totalTyped) * 100;
            accuracy = Math.min(100, Math.max(0, accuracy));
        } else {
            accuracy = 100;
        }
        accuracyDisplay.innerText = `${Math.floor(accuracy)}%`;
        
        // update WPM dynamically (if timer active)
        if (isActive && timeElapsed >= 1 && !gameCompleted) {
            calculateAndUpdateWPM(correctCount);
        } else if (!isActive && timeElapsed === 0) {
            wpmDisplay.innerText = "0";
        } else if (gameCompleted && timeElapsed > 0) {
            // final WPM already set but refresh to keep
            calculateAndUpdateWPM(correctCount);
        }
    }
    
    // helper to compute WPM based on correct chars and time (minutes)
    function calculateAndUpdateWPM(correctChars) {
        if (timeElapsed <= 0 || !isActive && !gameCompleted && timeElapsed === 0) {
            if(!gameCompleted) wpmDisplay.innerText = "0";
            return;
        }
        // standard WPM: (correct chars / 5) per minute
        const minutes = timeElapsed / 60;
        if (minutes <= 0) {
            wpmDisplay.innerText = "0";
            return;
        }
        let rawWpm = (correctChars / 5) / minutes;
        rawWpm = Math.floor(rawWpm);
        wpmDisplay.innerText = rawWpm;
    }
    
    // escape html special characters to avoid injection
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }
    
    // stop timer if running
    function stopTimer() {
        if (timer) {
            clearInterval(timer);
            timer = null;
        }
    }
    
    // start timer from zero (reset flag)
    function startTimer() {
        if (timer) stopTimer();
        isActive = true;
        timer = setInterval(() => {
            if (isActive && !gameCompleted) {
                timeElapsed++;
                timerDisplay.innerText = timeElapsed;
                // update WPM while typing based on correct chars so far
                let correctNow = 0;
                const limit = Math.min(userInput.length, currentQuote.length);
                for (let i = 0; i < limit; i++) {
                    if (userInput[i] === currentQuote[i]) correctNow++;
                }
                calculateAndUpdateWPM(correctNow);
                // check for completion inside interval as well
                checkCompletion();
            } else if (gameCompleted) {
                // if game completed, we keep timer but no changes, but also maybe stop incrementing? 
                // we can stop incrementing after completion to freeze WPM. Better stop increment.
                if (gameCompleted) {
                    // do not increase if game completed, but we stop the timer? Actually we stop increment later in completion
                    // but to be safe we just let it not increment.
                    if(isActive === true && gameCompleted) {
                        // idle state no increment; but we already set a flag
                    }
                }
            }
        }, 1000);
    }
    
    // evaluate if user completed the quote
    function checkCompletion() {
        if (gameCompleted) return true;
        // if user typed exactly the full quote AND no extra chars? or matching complete?
        const exactMatch = (userInput === currentQuote);
        if (exactMatch && currentQuote !== "") {
            // game finished successfully
            gameCompleted = true;
            isActive = false;    // stop active timer increments
            stopTimer();
            // final stats: freeze correct count
            let correctFinal = 0;
            for (let i = 0; i < currentQuote.length; i++) {
                if (userInput[i] === currentQuote[i]) correctFinal++;
            }
            calculateAndUpdateWPM(correctFinal);
            statusMsgDiv.innerHTML = "🏆 PERFECT! Quote completed. Press New Quote or Reset to play again. 🎉";
            statusMsgDiv.style.background = "#1f3b2c";
            userTextarea.disabled = true;
            renderHighlightedText();
            return true;
        }
        return false;
    }
    
    // reset everything but keep same quote (full reset)
    function fullReset(keepQuote = true) {
        stopTimer();
        // clear timer
        isActive = false;
        gameCompleted = false;
        timeElapsed = 0;
        timerDisplay.innerText = "0";
        userInput = "";
        userTextarea.value = "";
        userTextarea.disabled = false;
        if (!keepQuote) {
            // change quote if needed
            currentQuote = getRandomQuote();
        }
        // re-render highlights
        userInput = "";
        renderHighlightedText();
        wpmDisplay.innerText = "0";
        accuracyDisplay.innerText = "100%";
        progressDisplay.innerText = `0/${currentQuote.length}`;
        statusMsgDiv.innerHTML = "🔄 Reset complete. Start typing to begin timer!";
        statusMsgDiv.style.background = "#0b1120aa";
        // focus input
        userTextarea.focus();
        // extra safety: reset any active flags
        isActive = false;
        gameCompleted = false;
    }
    
    // new quote: load random quote, full clean state
    function newQuoteSession() {
        stopTimer();
        isActive = false;
        gameCompleted = false;
        timeElapsed = 0;
        timerDisplay.innerText = "0";
        userInput = "";
        userTextarea.value = "";
        userTextarea.disabled = false;
        currentQuote = getRandomQuote();
        renderHighlightedText();
        wpmDisplay.innerText = "0";
        accuracyDisplay.innerText = "100%";
        progressDisplay.innerText = `0/${currentQuote.length}`;
        statusMsgDiv.innerHTML = "✨ New quote loaded! Start typing to begin test. ✨";
        statusMsgDiv.style.background = "#0b1120aa";
        userTextarea.focus();
    }
    
    // handle user input from textarea
    function onUserTyping(e) {
        if (gameCompleted) {
            // if completed and user tries to type, ignore or force reset?
            statusMsgDiv.innerHTML = "⛔ Test finished! Click 'New Quote' or 'Reset' to continue.";
            userTextarea.value = userInput;  // revert any change
            return;
        }
        let rawValue = e.target.value;
        // we allow full string, avoid newline replacing for nice tests but keep as is (but no extra newline issues)
        // update state
        userInput = rawValue;
        // start timer on first keystroke if not active and no game complete
        if (!isActive && !gameCompleted && userInput.length > 0) {
            // first character typed
            startTimer();
            statusMsgDiv.innerHTML = "⌨️ Timer started — keep typing with accuracy!";
        }
        // if game complete check after each update
        const completed = checkCompletion();
        if (!completed) {
            renderHighlightedText();
            // edge: if user deleted everything and timer still active? keep timer active, but if userInput becomes 0, we shouldn't reset timer logically but time continues: acceptable.
            if (userInput.length === 0 && isActive && !gameCompleted) {
                // timer remains (don't reset) but we update status?
            }
        } else {
            renderHighlightedText();
        }
        
        // additional correction when user typed exactly beyond quote: but we show warning in highlight
        if (userInput.length > currentQuote.length && !gameCompleted) {
            // no auto fail, just show overflow red
            renderHighlightedText();
        } else {
            renderHighlightedText();
        }
    }
    
    // initial load
    function initGame() {
        currentQuote = getRandomQuote();
        renderHighlightedText();
        userTextarea.value = "";
        userInput = "";
        isActive = false;
        gameCompleted = false;
        timeElapsed = 0;
        timerDisplay.innerText = "0";
        wpmDisplay.innerText = "0";
        accuracyDisplay.innerText = "100%";
        progressDisplay.innerText = `0/${currentQuote.length}`;
        userTextarea.disabled = false;
        userTextarea.focus();
        statusMsgDiv.innerHTML = "⚡ Type the text above — timer starts on first keystroke.";
        stopTimer(); // ensure no ghost intervals
    }
    
    // add event listeners
    userTextarea.addEventListener("input", onUserTyping);
    newQuoteBtn.addEventListener("click", () => {
        newQuoteSession();
    });
    resetBtn.addEventListener("click", () => {
        fullReset(true);
    });
    
    // initial run
    initGame();
</script>
</body>
</html>
